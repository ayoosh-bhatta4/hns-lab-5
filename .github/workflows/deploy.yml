name: CI Pipeline (Build & Validate)

on:
  push:
    branches: [main]

jobs:
  build:
    name: Continuous Integration (Docker Build)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Verify Dependencies
      run: |
        echo "Checking requirements..."
        cat requirements.txt

    - name: Build Docker Image (CI Test)
      run: |
        echo "Building image to verify containerization..."
        docker build -t tip-app-test .
        echo "✅ Docker build successful. Ready for deployment when AWS infrastructure is re-provisioned."
